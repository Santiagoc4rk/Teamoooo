<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti 🌻</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Montserrat:wght@300;400&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height:100vh; background:#0a0800;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    overflow:hidden; font-family:'Montserrat',sans-serif; cursor:default;
  }
  canvas { position:fixed; inset:0; width:100%; height:100%; z-index:0; }
  .hint {
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
    z-index:20; font-size:11px; letter-spacing:3px; text-transform:uppercase;
    color:#d4a017; opacity:1; transition:opacity 1s;
    display:flex; align-items:center; gap:8px;
    animation: bob 2s ease-in-out infinite;
  }
  @keyframes bob { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(-5px)} }
  .overlay {
    position:fixed; inset:0; z-index:30;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    pointer-events:none; opacity:0; transition:opacity 1.2s ease;
    text-align:center; padding:24px;
  }
  .overlay.show { opacity:1; }
  .overlay-bg {
    position:absolute; inset:0;
    background:radial-gradient(ellipse at 50% 50%, rgba(20,14,0,0.88) 0%, rgba(5,3,0,0.96) 100%);
  }
  .overlay-content { position:relative; z-index:1; }
  .date-tag {
    font-size:10px; letter-spacing:4px; text-transform:uppercase;
    color:#d4a017; margin-bottom:20px;
    opacity:0; transform:translateY(16px); transition:all .8s .2s ease;
  }
  .overlay.show .date-tag { opacity:1; transform:translateY(0); }
  .big-title {
    font-family:'Cormorant Garamond',serif; font-weight:300; font-style:italic;
    font-size:clamp(34px,8.5vw,70px); line-height:1.2; color:#fff8e7;
    opacity:0; transform:translateY(20px); transition:all .9s .4s ease;
    margin-bottom:20px;
  }
  .overlay.show .big-title { opacity:1; transform:translateY(0); }
  .big-title em { color:#f5c518; font-style:normal; }
  .divider {
    display:flex; align-items:center; gap:12px; justify-content:center;
    margin-bottom:20px; opacity:0; transition:all .8s .7s ease;
  }
  .overlay.show .divider { opacity:1; }
  .dline { width:50px; height:1px; background:#d4a017; }
  .ddot { width:5px; height:5px; border-radius:50%; background:#f5c518; }
  .teamo {
    font-size:10px; letter-spacing:5px; text-transform:uppercase; color:#d4a017;
    opacity:0; transition:all .8s 1s ease; margin-bottom:28px;
  }
  .overlay.show .teamo { opacity:1; }
  .replay-btn {
    margin-top:4px; padding:10px 28px; border:1px solid #d4a017;
    background:transparent; color:#d4a017; font-size:10px; letter-spacing:3px;
    text-transform:uppercase; cursor:pointer; border-radius:100px;
    font-family:'Montserrat',sans-serif; pointer-events:all;
    opacity:0; transition:all .8s 1.4s ease;
  }
  .overlay.show .replay-btn { opacity:1; }
  .replay-btn:hover { background:#d4a017; color:#0a0800; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hint" id="hint"><span>✦</span> toca el girasol <span>✦</span></div>
<div class="overlay" id="overlay">
  <div class="overlay-bg"></div>
  <div class="overlay-content">
    <p class="date-tag">21 · Marzo · 2026</p>
    <h1 class="big-title">Nunca me voy a<br>olvidar de darte<br>tus <em>flores</em>, mi amor</h1>
    <div class="divider"><div class="dline"></div><div class="ddot"></div><div class="dline"></div></div>
    <p class="teamo">te amo · te amo · te amo · te amo</p>
    <button class="replay-btn" onclick="replay()">volver a ver 🌻</button>
  </div>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const hint=document.getElementById('hint'),overlay=document.getElementById('overlay');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
const YELLOWS=['#f5c518','#fdd835','#ffca28','#f0b429','#ffe082','#ffb300','#ffc107'];
const GREENS=['#4a7c2f','#5a8c35','#3d6b27'];
class Petal{constructor(b){this.burst=b||false;this.reset();if(!b)this.y=Math.random()*H;}
reset(){if(this.burst){const a=Math.random()*Math.PI*2,spd=2+Math.random()*7;this.x=W/2;this.y=H*0.55;this.vx=Math.cos(a)*spd;this.vy=Math.sin(a)*spd-5;this.gravity=0.13;this.life=1;this.decay=0.007+Math.random()*0.007;}else{this.x=Math.random()*W;this.y=-20;this.vx=(Math.random()-.5)*1.5;this.vy=0.8+Math.random()*1.5;this.gravity=0;this.life=0.6+Math.random()*0.4;this.decay=0;}this.size=3+Math.random()*7;this.color=YELLOWS[Math.floor(Math.random()*YELLOWS.length)];this.rot=Math.random()*Math.PI*2;this.rotV=(Math.random()-.5)*0.1;this.type=Math.floor(Math.random()*3);}
update(){this.x+=this.vx+Math.sin(this.y*.015)*.4;this.y+=this.vy;this.vy+=this.gravity;this.rot+=this.rotV;if(this.burst){this.life-=this.decay;if(this.life<=0)this.dead=true;}else{if(this.y>H+20)this.reset();}}
draw(){ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.rot);ctx.globalAlpha=this.life;ctx.fillStyle=this.color;const s=this.size;if(this.type===0){ctx.beginPath();ctx.ellipse(0,0,s,s*1.8,0,0,Math.PI*2);ctx.fill();}else if(this.type===1){ctx.beginPath();ctx.moveTo(0,-s);ctx.bezierCurveTo(s,-s*.5,s,s*.5,0,s);ctx.bezierCurveTo(-s,s*.5,-s,-s*.5,0,-s);ctx.fill();}else{ctx.beginPath();ctx.arc(0,0,s*.7,0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;ctx.restore();}}
function drawBouquetFlower(x,y,s,pc,rot){ctx.save();ctx.translate(x,y);ctx.rotate(rot||0);for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2;ctx.save();ctx.rotate(a);ctx.fillStyle=pc;ctx.beginPath();ctx.ellipse(0,-s*1.4,s*.45,s*.8,0,0,Math.PI*2);ctx.fill();ctx.restore();}ctx.fillStyle='#3e2000';ctx.beginPath();ctx.arc(0,0,s*.5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#6b3a00';for(let r=s*.15;r<s*.45;r+=s*.12){const n=Math.floor(r*10);for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2;ctx.beginPath();ctx.arc(Math.cos(a)*r,Math.sin(a)*r,s*.07,0,Math.PI*2);ctx.fill();}}ctx.restore();}
function drawBouquet(progress,alpha){if(progress<=0)return;ctx.save();ctx.globalAlpha=Math.min(alpha,1);const cx=W/2,cy=H*.38,p=Math.min(progress,1);ctx.fillStyle='#b8922a';ctx.save();ctx.translate(cx,cy+100);ctx.beginPath();ctx.moveTo(-42,0);ctx.lineTo(42,0);ctx.lineTo(28,90);ctx.lineTo(-28,90);ctx.closePath();ctx.fill();ctx.fillStyle='#d4a017';ctx.beginPath();ctx.ellipse(-28,-12,24,13,Math.PI*.3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(28,-12,24,13,-Math.PI*.3,0,Math.PI*2);ctx.fill();ctx.fillStyle='#f5c518';ctx.beginPath();ctx.arc(0,-12,11,0,Math.PI*2);ctx.fill();ctx.restore();
[{x:-75,y:50,r:-.5,rx:30,ry:13},{x:75,y:38,r:.5,rx:30,ry:13},{x:-55,y:12,r:-.8,rx:24,ry:11},{x:60,y:6,r:.7,rx:24,ry:11},{x:0,y:-12,r:0,rx:18,ry:9}].forEach(l=>{ctx.save();ctx.translate(cx+l.x,cy+l.y);ctx.rotate(l.r);ctx.fillStyle=GREENS[0];ctx.beginPath();ctx.ellipse(0,0,l.rx*p,l.ry*p,0,0,Math.PI*2);ctx.fill();ctx.restore();});
[{x:0,y:-40,s:44,c:'#f5c518',rot:0},{x:-65,y:-15,s:36,c:'#fdd835',rot:.2},{x:65,y:-20,s:36,c:'#ffca28',rot:-.2},{x:-36,y:-75,s:30,c:'#f0b429',rot:-.1},{x:36,y:-80,s:30,c:'#ffe082',rot:.15},{x:-95,y:10,s:24,c:'#ffb300',rot:.35},{x:95,y:5,s:24,c:'#ffc107',rot:-.35}].forEach((f,i)=>{const fp=Math.max(0,Math.min(1,(p-i*.06)/.6));if(fp<=0)return;drawBouquetFlower(cx+f.x*fp,cy+f.y*fp,f.s*fp,f.c,f.rot);});
if(p>.7){const sp=(p-.7)/.3;for(let i=0;i<14;i++){const a=(i/14)*Math.PI*2,r=130+Math.sin(i*1.3)*30;ctx.fillStyle='#f5c518';ctx.globalAlpha=sp*.9;ctx.save();ctx.translate(cx+Math.cos(a)*r*sp,cy+Math.sin(a)*r*sp*.7);ctx.rotate(a);const ss=3+(i%3)*2;ctx.beginPath();ctx.moveTo(0,-ss*2);ctx.lineTo(ss*.4,-ss*.4);ctx.lineTo(ss*2,0);ctx.lineTo(ss*.4,ss*.4);ctx.lineTo(0,ss*2);ctx.lineTo(-ss*.4,ss*.4);ctx.lineTo(-ss*2,0);ctx.lineTo(-ss*.4,-ss*.4);ctx.closePath();ctx.fill();ctx.restore();}}ctx.globalAlpha=1;ctx.restore();}
function sunflowerRect(){return{x:W/2-50,y:H*.55-140,w:100,h:150};}
let sunHovered=false;
function drawSunflower(){const cx=W/2,cy=H*.55,pulse=1+Math.sin(Date.now()*.004)*.04+(sunHovered?.08:0),s=pulse;ctx.save();ctx.translate(cx,cy);ctx.strokeStyle='#4a7c2f';ctx.lineWidth=5*s;ctx.beginPath();ctx.moveTo(0,0);ctx.bezierCurveTo(-8,-40,-8,-80,0,-120*s);ctx.stroke();[[-1,.45],[1,.6]].forEach(([side,pos])=>{ctx.save();ctx.translate(side*10*s,-120*s*pos);ctx.rotate(side*.7);ctx.fillStyle='#5a8c35';ctx.beginPath();ctx.ellipse(side*14*s,0,18*s,9*s,0,0,Math.PI*2);ctx.fill();ctx.restore();});if(sunHovered){const glow=ctx.createRadialGradient(0,-120*s,0,0,-120*s,60);glow.addColorStop(0,'rgba(245,197,24,0.35)');glow.addColorStop(1,'rgba(245,197,24,0)');ctx.fillStyle=glow;ctx.beginPath();ctx.arc(0,-120*s,60,0,Math.PI*2);ctx.fill();}for(let i=0;i<13;i++){const a=(i/13)*Math.PI*2+Date.now()*.0005;ctx.save();ctx.translate(0,-120*s);ctx.rotate(a);ctx.fillStyle=i%2===0?'#f5c518':'#f0b429';ctx.beginPath();ctx.ellipse(0,-27*s,6.5*s,15*s,0,0,Math.PI*2);ctx.fill();ctx.restore();}ctx.fillStyle='#3e2000';ctx.beginPath();ctx.arc(0,-120*s,16*s,0,Math.PI*2);ctx.fill();ctx.fillStyle='#6b3a00';for(let r=4*s;r<13*s;r+=3*s){const nd=Math.floor(r*2.8);for(let i=0;i<nd;i++){const a=(i/nd)*Math.PI*2;ctx.beginPath();ctx.arc(Math.cos(a)*r,-120*s+Math.sin(a)*r,1.3*s,0,Math.PI*2);ctx.fill();}}if(!clicked){ctx.strokeStyle=`rgba(245,197,24,${.3+Math.sin(Date.now()*.003)*.3})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,-120*s,32*s,0,Math.PI*2);ctx.stroke();}ctx.restore();}
let petals=Array.from({length:45},()=>new Petal(false)),burstPetals=[],clicked=false,bouquetProgress=0,bouquetAlpha=0,phase='idle';
function triggerClick(){if(clicked)return;clicked=true;phase='burst';hint.style.opacity='0';hint.style.pointerEvents='none';for(let i=0;i<130;i++){setTimeout(()=>{const p=new Petal(true);p.x=W/2+(Math.random()-.5)*70;p.y=H*.55-120;p.size=4+Math.random()*11;p.color=YELLOWS[Math.floor(Math.random()*YELLOWS.length)];burstPetals.push(p);},i*12);}setTimeout(()=>{phase='bouquet';let start=null;function grow(ts){if(!start)start=ts;const el=(ts-start)/1800;bouquetProgress=Math.min(el,1);bouquetAlpha=Math.min(el*2,1);if(bouquetProgress<1)requestAnimationFrame(grow);else{phase='message';setTimeout(()=>overlay.classList.add('show'),300);}}requestAnimationFrame(grow);},1500);}
function replay(){overlay.classList.remove('show');clicked=false;phase='idle';bouquetProgress=0;bouquetAlpha=0;burstPetals=[];hint.style.opacity='1';hint.style.pointerEvents='all';}
canvas.addEventListener('click',e=>{const r=sunflowerRect();if(!clicked&&e.clientX>=r.x&&e.clientX<=r.x+r.w&&e.clientY>=r.y&&e.clientY<=r.y+r.h)triggerClick();});
canvas.addEventListener('mousemove',e=>{const r=sunflowerRect();sunHovered=!clicked&&e.clientX>=r.x&&e.clientX<=r.x+r.w&&e.clientY>=r.y&&e.clientY<=r.y+r.h;canvas.style.cursor=sunHovered?'pointer':'default';});
canvas.addEventListener('touchend',e=>{const t=e.changedTouches[0],r=sunflowerRect();if(t.clientX>=r.x&&t.clientX<=r.x+r.w&&t.clientY>=r.y&&t.clientY<=r.y+r.h)triggerClick();});
function draw(){ctx.clearRect(0,0,W,H);const bg=ctx.createRadialGradient(W/2,H*.4,0,W/2,H*.5,Math.max(W,H)*.75);bg.addColorStop(0,'#1c1400');bg.addColorStop(1,'#060400');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);const ag=ctx.createRadialGradient(W/2,H*.5,0,W/2,H*.5,300);ag.addColorStop(0,'rgba(245,197,24,0.05)');ag.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=ag;ctx.fillRect(0,0,W,H);petals.forEach(p=>{p.update();p.draw();});burstPetals=burstPetals.filter(p=>!p.dead);burstPetals.forEach(p=>{p.update();p.draw();});if(phase!=='message')drawSunflower();if(bouquetProgress>0)drawBouquet(bouquetProgress,bouquetAlpha);requestAnimationFrame(draw);}
draw();
</script>
</body>
</html>
